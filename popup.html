<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 220px;
    background: #0d0d1a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    user-select: none;
  }

  .header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid #1e1e3a;
  }
  .header h1 {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.3px;
  }
  .header p {
    font-size: 11px;
    color: #666;
    margin-top: 2px;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
  }

  .label {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .label span:first-child {
    font-weight: 500;
    color: #e0e0e0;
  }
  .label span:last-child {
    font-size: 11px;
    color: #555;
  }

  /* Toggle switch */
  .toggle {
    position: relative;
    width: 40px;
    height: 22px;
    flex-shrink: 0;
  }
  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }
  .slider {
    position: absolute;
    inset: 0;
    background: #2a2a4a;
    border-radius: 22px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 3px;
    top: 3px;
    background: #666;
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  input:checked + .slider {
    background: #3d2fff22;
    border: 1px solid #5b8def55;
  }
  input:checked + .slider::before {
    transform: translateX(18px);
    background: #5b8def;
    box-shadow: 0 0 6px #5b8defaa;
  }

  .footer {
    padding: 8px 16px 12px;
    border-top: 1px solid #1e1e3a;
    font-size: 10px;
    color: #333;
    text-align: center;
  }
  .footer a {
    color: #5b8def;
    text-decoration: none;
  }
  .footer a:hover { text-decoration: underline; }

  .shortcut {
    display: inline-block;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 11px;
    font-family: monospace;
    color: #888;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Polymarket Whip</h1>
  <p>Visual chart booster</p>
</div>

<div class="row">
  <div class="label">
    <span>Whip enabled</span>
    <span>Unlimited cracks</span>
  </div>
  <label class="toggle">
    <input type="checkbox" id="toggle" checked>
    <span class="slider"></span>
  </label>
</div>

<div style="padding: 0 16px 14px; text-align:center;">
  <span class="shortcut">Space + W</span>
</div>

<div class="footer">
  <a href="https://t.me/shtanga0x" target="_blank">t.me/shtanga0x</a>
</div>

<script src="popup.js"></script>
</body>
</html>
